<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>Walking Pad</title>
    <meta name="description" content="Finger-walk on a 3D walking pad. Drag to move the belt." />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Walking Pad" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="ext-resource-dependency" content="https://unpkg.com/three@0.165.0/build/three.module.js" data-resource-id="three" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <template id="__bundler_thumbnail" data-bg-color="#ffffff">
      <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
        <rect width="1200" height="800" fill="#ffffff" />
        <g transform="translate(600 410) rotate(-7)">
          <rect x="-150" y="-250" width="300" height="500" rx="26" fill="#141619" />
          <rect x="-110" y="-210" width="220" height="420" rx="10" fill="#0b0c0f" />
          <g stroke="#2a2d34" stroke-width="9">
            <line x1="-110" y1="-160" x2="110" y2="-160" />
            <line x1="-110" y1="-100" x2="110" y2="-100" />
            <line x1="-110" y1="-40" x2="110" y2="-40" />
            <line x1="-110" y1="20" x2="110" y2="20" />
            <line x1="-110" y1="80" x2="110" y2="80" />
            <line x1="-110" y1="140" x2="110" y2="140" />
          </g>
          <rect x="-44" y="-238" width="88" height="16" rx="6" fill="#9fd0d4" />
        </g>
      </svg>
    </template>
    <style>
      :root {
        --ink: #14161a;
        --muted: #9aa0aa;
        --line: rgba(20, 22, 26, 0.1);
        --accent: oklch(0.66 0.085 195);
        --accent-soft: oklch(0.66 0.085 195 / 0.16);
        --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }

      * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        color: var(--ink);
        font-family: var(--mono);
        font-feature-settings: "tnum" 1;
        touch-action: none;
        /* clean white backdrop */
        background:
          radial-gradient(125% 95% at 50% 14%, #ffffff 0%, #ffffff 48%, #eef1f3 100%);
      }

      #app {
        position: fixed;
        inset: 0;
      }

      #touch-layer {
        position: fixed;
        inset: 0;
      }

      /* --- Finger dots --- */
      .dot {
        position: fixed;
        width: 30px;
        height: 30px;
        margin-left: -15px;
        margin-top: -15px;
        border-radius: 50%;
        pointer-events: none;
        border: 1.5px solid rgba(255, 255, 255, 0.6);
        background: rgba(255, 255, 255, 0.22);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
        opacity: 0;
        transform: scale(0.7);
        transition: opacity 0.14s ease, transform 0.14s ease, background 0.14s ease;
        backdrop-filter: blur(2px);
      }
      .dot.active {
        opacity: 1;
        transform: scale(1);
      }
      .dot.step {
        background: var(--accent-soft);
        border-color: var(--accent);
      }

      /* --- Slim single-line mono top bar --- */
      #hud {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 16px);
        left: 50%;
        transform: translateX(-50%);
        max-width: calc(100vw - 28px);
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 9px 15px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.8) inset,
          0 6px 22px rgba(20, 22, 26, 0.08);
        backdrop-filter: blur(14px) saturate(1.15);
        -webkit-backdrop-filter: blur(14px) saturate(1.15);
        white-space: nowrap;
        user-select: none;
        -webkit-user-select: none;
        overflow: hidden;
      }

      #hud .led {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.3;
        flex: none;
        transition: opacity 0.4s ease, box-shadow 0.4s ease;
      }
      #hud .led.on {
        opacity: 1;
        box-shadow: 0 0 0 4px var(--accent-soft);
      }

      .stat {
        display: inline-flex;
        align-items: baseline;
        gap: 4px;
        font-size: 13px;
        font-weight: 500;
      }
      .stat b {
        font-weight: 700;
        font-size: 15px;
        letter-spacing: -0.01em;
        color: var(--ink);
        font-variant-numeric: tabular-nums;
      }
      .stat .u {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .dot-sep {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--ink);
        opacity: 0.2;
        flex: none;
      }
      .pulse {
        color: var(--accent) !important;
        transition: color 0.5s ease;
      }

      /* hold-to-reset fill */
      #reset-ring {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        background: var(--accent-soft);
        transition: opacity 0.2s ease;
      }
      #reset-ring.arming {
        opacity: 1;
      }

      /* --- Coach hint (bottom) --- */
      #hint {
        position: fixed;
        left: 50%;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 26px);
        transform: translateX(-50%);
        padding: 10px 18px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid var(--line);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        font-family: var(--mono);
        font-size: 11.5px;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: var(--muted);
        text-transform: uppercase;
        white-space: nowrap;
        transition: opacity 0.5s ease, transform 0.5s ease;
        pointer-events: none;
      }
      #hint.hidden {
        opacity: 0;
        transform: translateX(-50%) translateY(8px);
      }
      #hint b {
        color: var(--ink);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="touch-layer"></div>

    <div id="hud">
      <div id="reset-ring"></div>
      <span class="led" id="live"></span>
      <span class="stat"><b id="dist-value">0</b><span class="u" id="dist-unit">ft</span></span>
      <span class="dot-sep"></span>
      <span class="stat"><b id="dist-mi">0.00</b><span class="u">mi</span></span>
      <span class="dot-sep"></span>
      <span class="stat"><b id="steps">0</b><span class="u">steps</span></span>
    </div>

    <div id="hint">Place <b>two fingers</b> &amp; step</div>

    <script type="module">
      // Dynamic import so the offline bundle can swap in a blob URL.
      const THREE = await import(
        (window.__resources && window.__resources.three) ||
          "https://unpkg.com/three@0.165.0/build/three.module.js"
      );

      const app = document.getElementById("app");
      const touchLayer = document.getElementById("touch-layer");
      const distValueEl = document.getElementById("dist-value");
      const distUnitEl = document.getElementById("dist-unit");
      const distMiEl = document.getElementById("dist-mi");
      const stepsEl = document.getElementById("steps");
      const hintEl = document.getElementById("hint");
      const hudEl = document.getElementById("hud");
      const liveEl = document.getElementById("live");
      const resetRing = document.getElementById("reset-ring");

      const dotA = document.createElement("div");
      const dotB = document.createElement("div");
      dotA.className = "dot";
      dotB.className = "dot";
      touchLayer.appendChild(dotA);
      touchLayer.appendChild(dotB);
      const DOTS = [dotA, dotB];

      // ---------------------------------------------------------------
      // Renderer / scene
      // ---------------------------------------------------------------
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = false;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 0.94;
      app.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = null; // let the CSS backdrop show through

      const camera = new THREE.PerspectiveCamera(
        34,
        window.innerWidth / window.innerHeight,
        0.05,
        100
      );

      // ---- Real under-desk walking pad, lying flat on the floor ----
      // X = width (left/right), Z = length (receding into screen), Y = up.
      const BELT_W = 0.86;
      const BELT_L = 2.5;
      const RAIL_W = 0.115;
      const DECK_H = 0.085; // body height off the floor
      const BODY_W = BELT_W + 2 * RAIL_W + 0.05; // ≈ 1.14
      const CAP_L = 0.2; // end-cap length at each end
      const BODY_L = BELT_L + 2 * CAP_L; // ≈ 2.9
      const beltTopY = DECK_H + 0.022; // belt sits proud above the deck border

      // Vertical, head-on view (no slant). Slight elevation for a touch of depth.
      const VIEW_DIR = new THREE.Vector3(0, 0.17, 1.0).normalize();
      const fitTarget = new THREE.Vector3(0, 0.14, 0.07);

      function fitCameraToPad() {
        const aspect = window.innerWidth / window.innerHeight;
        camera.aspect = aspect;
        const vFov = THREE.MathUtils.degToRad(camera.fov);
        const hFov = 2 * Math.atan(Math.tan(vFov / 2) * aspect);
        const tanV = Math.tan(vFov / 2);
        const tanH = Math.tan(hFov / 2);

        // camera basis (zAxis points from target toward camera)
        const zAxis = VIEW_DIR.clone();
        const worldUp = new THREE.Vector3(0, 1, 0);
        const xAxis = new THREE.Vector3().crossVectors(worldUp, zAxis).normalize();
        const yAxis = new THREE.Vector3().crossVectors(zAxis, xAxis).normalize();

        // bounding box of the upright pad: wide=X, tall=Y, shallow depth=Z
        const c0 = new THREE.Vector3(0, 0, 0.07);
        const hx = BODY_W * 0.5 + 0.03;
        const hy = BODY_L * 0.5 + 0.03;
        const hz = 0.13;
        let need = 0;
        for (const sx of [-1, 1])
          for (const sy of [-1, 1])
            for (const sz of [-1, 1]) {
              const v = new THREE.Vector3(
                c0.x + sx * hx - fitTarget.x,
                c0.y + sy * hy - fitTarget.y,
                c0.z + sz * hz - fitTarget.z
              );
              const cx = v.dot(xAxis);
              const cyy = v.dot(yAxis);
              const cz = v.dot(zAxis);
              need = Math.max(need, Math.abs(cx) / tanH + cz, Math.abs(cyy) / tanV + cz);
            }
        const dist = need * 1.16; // extra padding leaves breathing room for the HUD
        camera.position.copy(fitTarget).addScaledVector(zAxis, dist);
        camera.lookAt(fitTarget);
        camera.updateProjectionMatrix();
      }

      // ---------------------------------------------------------------
      // Lighting
      // ---------------------------------------------------------------
      scene.add(new THREE.AmbientLight(0xffffff, 0.5));
      scene.add(new THREE.HemisphereLight(0xffffff, 0xdfe4ea, 0.42));

      const key = new THREE.DirectionalLight(0xffffff, 1.5);
      key.castShadow = true;
      key.shadow.mapSize.set(2048, 2048);
      key.shadow.camera.near = 0.5;
      key.shadow.camera.far = 16;
      key.shadow.camera.left = -1.6;
      key.shadow.camera.right = 1.6;
      key.shadow.camera.top = 2.0;
      key.shadow.camera.bottom = -2.0;
      key.shadow.bias = -0.0004;
      key.shadow.radius = 8;
      key.position.set(1.6, 2.4, 4.2); // front-top → casts a soft shadow onto the backdrop
      key.target.position.set(0, -0.2, 0);
      scene.add(key);
      scene.add(key.target);

      const fill = new THREE.DirectionalLight(0xeef3f8, 0.42);
      fill.position.set(-3, 1, 3.5);
      scene.add(fill);

      // ---------------------------------------------------------------
      // Walking pad
      // ---------------------------------------------------------------
      const padGroup = new THREE.Group();
      padGroup.rotation.x = Math.PI / 2; // stand the flat-built pad upright
      scene.add(padGroup);

      const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x141619,
        roughness: 0.55,
        metalness: 0.34,
      });
      const borderMat = new THREE.MeshStandardMaterial({
        color: 0x0f1013,
        roughness: 0.72,
        metalness: 0.2,
      });
      const railMat = new THREE.MeshStandardMaterial({
        color: 0x33373e,
        roughness: 0.4,
        metalness: 0.55,
      });
      const capMat = new THREE.MeshStandardMaterial({
        color: 0x1b1e23,
        roughness: 0.44,
        metalness: 0.5,
      });
      const beltEndMat = new THREE.MeshStandardMaterial({
        color: 0x0c0d10,
        roughness: 0.55,
        metalness: 0.08,
      });

      // ---- rounded-rect slab helper (width X, length Z, height Y; bottom at y=0) ----
      function roundedRectShape(w, l, r) {
        r = Math.min(r, w / 2, l / 2);
        const s = new THREE.Shape();
        const x = -w / 2;
        const y = -l / 2;
        s.moveTo(x + r, y);
        s.lineTo(x + w - r, y);
        s.quadraticCurveTo(x + w, y, x + w, y + r);
        s.lineTo(x + w, y + l - r);
        s.quadraticCurveTo(x + w, y + l, x + w - r, y + l);
        s.lineTo(x + r, y + l);
        s.quadraticCurveTo(x, y + l, x, y + l - r);
        s.lineTo(x, y + r);
        s.quadraticCurveTo(x, y, x + r, y);
        return s;
      }
      function roundedSlab(w, l, h, r, bevel) {
        bevel = Math.min(bevel == null ? 0.012 : bevel, h * 0.45);
        const geo = new THREE.ExtrudeGeometry(roundedRectShape(w, l, r), {
          depth: Math.max(0.001, h - bevel * 2),
          bevelEnabled: true,
          bevelThickness: bevel,
          bevelSize: bevel,
          bevelSegments: 3,
          curveSegments: 12,
        });
        geo.rotateX(-Math.PI / 2); // shape plane → floor; extrude → vertical (Y)
        geo.computeBoundingBox();
        geo.translate(0, -geo.boundingBox.min.y, 0); // seat bottom at y=0
        geo.computeVertexNormals();
        return geo;
      }

      // main chassis slab (rounded outer corners + softened top edges)
      const chassis = new THREE.Mesh(
        roundedSlab(BODY_W, BODY_L, DECK_H, 0.085, 0.014),
        bodyMat
      );
      chassis.position.y = 0;
      padGroup.add(chassis);

      // thin matte top border around the belt
      const topPlate = new THREE.Mesh(
        roundedSlab(BODY_W - 0.014, BODY_L - 0.014, 0.014, 0.072, 0.005),
        borderMat
      );
      topPlate.position.y = DECK_H - 0.002;
      padGroup.add(topPlate);

      // ---------------------------------------------------------------
      // Seamless belt texture (slats at exact intervals → no seam)
      // ---------------------------------------------------------------
      const TEX_W = 256;
      const TEX_H = 512;
      const SLAT_COUNT = 8; // divides evenly → seamless vertical tiling
      const SLAT_H = TEX_H / SLAT_COUNT;

      const beltCanvas = document.createElement("canvas");
      beltCanvas.width = TEX_W;
      beltCanvas.height = TEX_H;
      const c = beltCanvas.getContext("2d");

      c.fillStyle = "#0a0b0e";
      c.fillRect(0, 0, TEX_W, TEX_H);
      // fabric speckle
      for (let i = 0; i < 2600; i++) {
        const x = Math.random() * TEX_W;
        const y = Math.random() * TEX_H;
        c.fillStyle = Math.random() > 0.5 ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.08)";
        c.fillRect(x, y, 1.4, 1.4);
      }
      // Tread slats drawn as solid contrasting bands (survive mipmap
      // downsampling far better than thin lines → clearly reads as tread).
      const GROOVE = 9; // dark groove between slat faces
      for (let s = 0; s < SLAT_COUNT; s++) {
        const y0 = s * SLAT_H;
        const faceTop = y0 + GROOVE * 0.5;
        const faceH = SLAT_H - GROOVE;
        // solid mid-grey slat face with top→bottom shading
        const grad = c.createLinearGradient(0, faceTop, 0, faceTop + faceH);
        grad.addColorStop(0.0, "#30343c"); // bright top edge catching light
        grad.addColorStop(0.22, "#202329");
        grad.addColorStop(0.6, "#15171c");
        grad.addColorStop(1.0, "#0b0c0f"); // falls into the groove shadow
        c.fillStyle = grad;
        c.fillRect(0, faceTop, TEX_W, faceH);
        // crisp highlight ridge along the very top of each slat
        c.fillStyle = "rgba(150,160,175,0.45)";
        c.fillRect(0, faceTop, TEX_W, 2);
        // deep groove between slats
        c.fillStyle = "#050507";
        c.fillRect(0, y0 - GROOVE * 0.5 + 1, TEX_W, GROOVE - 2);
      }

      const beltTexture = new THREE.CanvasTexture(beltCanvas);
      beltTexture.wrapS = THREE.RepeatWrapping;
      beltTexture.wrapT = THREE.RepeatWrapping;
      beltTexture.repeat.set(1, 3); // ~24 slats over the belt length — clearly visible
      beltTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();

      // belt running surface (flat, lying in XZ)
      const beltGeo = new THREE.PlaneGeometry(BELT_W, BELT_L);
      beltGeo.rotateX(-Math.PI / 2); // lie flat; local Y(V) maps to world Z (length)
      const belt = new THREE.Mesh(
        beltGeo,
        new THREE.MeshStandardMaterial({
          color: 0xffffff,
          map: beltTexture,
          roughness: 0.58,
          metalness: 0.12,
        })
      );
      belt.position.y = beltTopY;
      belt.receiveShadow = true;
      padGroup.add(belt);

      // raised foot rails down each side of the belt
      function makeRail(x) {
        const r = new THREE.Mesh(
          new THREE.BoxGeometry(RAIL_W, 0.05, BELT_L + 0.14),
          railMat
        );
        r.position.set(x, DECK_H + 0.018, 0);
        r.castShadow = true;
        r.receiveShadow = true;
        padGroup.add(r);
        return r;
      }
      makeRail(-(BELT_W * 0.5 + RAIL_W * 0.5 + 0.004));
      makeRail(BELT_W * 0.5 + RAIL_W * 0.5 + 0.004);

      // end caps (housings over the rollers); front (far) is the console end.
      // Narrower than the body so the chassis's rounded frame shows around them.
      function makeCap(z, h) {
        const cap = new THREE.Mesh(
          roundedSlab(BODY_W - 0.17, CAP_L, h, 0.045, 0.012),
          capMat
        );
        cap.position.set(0, DECK_H - 0.004, z);
        padGroup.add(cap);
        return cap;
      }
      const frontCap = makeCap(-(BELT_L * 0.5 + CAP_L * 0.5 - 0.01), 0.062);
      makeCap(BELT_L * 0.5 + CAP_L * 0.5 - 0.01, 0.048);

      // rounded belt ends (the belt wrapping over the rollers)
      const rollerGeo = new THREE.CylinderGeometry(0.043, 0.043, BELT_W, 30);
      rollerGeo.rotateZ(Math.PI / 2); // axle along X → spin via rotation.x
      const topRoller = new THREE.Mesh(rollerGeo, beltEndMat);
      topRoller.position.set(0, beltTopY - 0.006, -(BELT_L * 0.5 - 0.012));
      topRoller.castShadow = true;
      padGroup.add(topRoller);
      const bottomRoller = new THREE.Mesh(rollerGeo, beltEndMat);
      bottomRoller.position.set(0, beltTopY - 0.006, BELT_L * 0.5 - 0.012);
      bottomRoller.castShadow = true;
      padGroup.add(bottomRoller);

      // Lit LCD console — centered on the front cap (like a real walking pad).
      const displayCanvas = document.createElement("canvas");
      displayCanvas.width = 160;
      displayCanvas.height = 72;
      const displayCtx = displayCanvas.getContext("2d");

      function drawDisplayScreen(mph, active) {
        const w = displayCanvas.width;
        const h = displayCanvas.height;
        displayCtx.fillStyle = active ? "#061018" : "#040608";
        displayCtx.fillRect(0, 0, w, h);
        // subtle scanlines
        for (let y = 0; y < h; y += 3) {
          displayCtx.fillStyle = "rgba(0,0,0,0.12)";
          displayCtx.fillRect(0, y, w, 1);
        }
        // vignette
        const vig = displayCtx.createRadialGradient(w / 2, h / 2, 8, w / 2, h / 2, w * 0.55);
        vig.addColorStop(0, "rgba(77,212,224,0.06)");
        vig.addColorStop(1, "rgba(0,0,0,0.35)");
        displayCtx.fillStyle = vig;
        displayCtx.fillRect(0, 0, w, h);

        const glow = active ? "#5ee8f0" : "#2a8890";
        displayCtx.shadowColor = glow;
        displayCtx.shadowBlur = active ? 10 : 4;
        displayCtx.fillStyle = glow;
        displayCtx.textAlign = "center";
        displayCtx.textBaseline = "middle";
        displayCtx.font = "600 28px ui-monospace, SFMono-Regular, Menlo, monospace";
        displayCtx.fillText(mph.toFixed(1), w / 2, h / 2 - 4);
        displayCtx.shadowBlur = 0;
        displayCtx.font = "500 11px ui-monospace, SFMono-Regular, Menlo, monospace";
        displayCtx.fillStyle = active ? "#7ad4dc" : "#3d6a70";
        displayCtx.fillText("MPH", w / 2, h / 2 + 18);
        displayCtx.shadowBlur = 0;
      }
      drawDisplayScreen(0, false);

      const displayTexture = new THREE.CanvasTexture(displayCanvas);
      displayTexture.colorSpace = THREE.SRGBColorSpace;

      const screenMat = new THREE.MeshStandardMaterial({
        map: displayTexture,
        emissive: 0x3ec8d4,
        emissiveMap: displayTexture,
        emissiveIntensity: 0.55,
        roughness: 0.32,
        metalness: 0.08,
      });

      const displayGroup = new THREE.Group();
      displayGroup.position.set(0, DECK_H + 0.056, frontCap.position.z);

      const displayBezel = new THREE.Mesh(
        new THREE.BoxGeometry(0.38, 0.018, 0.1),
        new THREE.MeshStandardMaterial({
          color: 0x08090c,
          roughness: 0.72,
          metalness: 0.22,
        })
      );
      displayBezel.castShadow = true;
      displayGroup.add(displayBezel);

      const displayGlass = new THREE.Mesh(
        new THREE.BoxGeometry(0.31, 0.007, 0.082),
        screenMat
      );
      displayGlass.position.y = 0.007;
      displayGroup.add(displayGlass);

      // faint status LED left of the screen
      const statusLed = new THREE.Mesh(
        new THREE.CircleGeometry(0.008, 16),
        new THREE.MeshStandardMaterial({
          color: 0x3dff9a,
          emissive: 0x1a9955,
          emissiveIntensity: 0.2,
          roughness: 0.4,
        })
      );
      statusLed.rotation.x = -Math.PI / 2;
      statusLed.position.set(-0.17, 0.011, 0);
      displayGroup.add(statusLed);

      padGroup.add(displayGroup);

      fitCameraToPad();

      // ---------------------------------------------------------------
      // Finger walking interaction
      // ---------------------------------------------------------------
      const touches = new Map();
      const walkers = {
        left: { active: false, id: null, prevY: 0, lastStepTime: 0, ready: true },
        right: { active: false, id: null, prevY: 0, lastStepTime: 0, ready: true },
      };

      let beltSpeed = 0; // smoothed glide speed (0..SPEED_MAX)
      let targetSpeed = 0;
      let lastStepMs = 0;
      let lastFoot = null;

      // metrics
      let distanceFeet = 0;
      let stepCount = 0;

      const SPEED_MAX = 6.0;
      const STEP_BOOST = 0.62;
      const STEP_MIN_TRAVEL = 14;
      const STEP_TIMEOUT_MS = 1000;

      // belt speed (arbitrary units) → real walking pace.
      // ~4 units reads as a brisk ~3 mph walk.
      const UNITS_TO_MPH = 0.78;
      const FEET_PER_MILE = 5280;

      // ---- persistence ----
      const STORE_KEY = "walkingpad.session.v1";
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
        if (saved && typeof saved.feet === "number") {
          distanceFeet = Math.max(0, saved.feet);
          stepCount = Math.max(0, saved.steps || 0);
        }
      } catch (e) {}
      let saveTimer = 0;
      function scheduleSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          try {
            localStorage.setItem(
              STORE_KEY,
              JSON.stringify({ feet: distanceFeet, steps: stepCount })
            );
          } catch (e) {}
        }, 400);
      }

      function setDot(i, x, y, active, step) {
        const d = DOTS[i];
        d.style.left = `${x}px`;
        d.style.top = `${y}px`;
        d.classList.toggle("active", active);
        if (step !== undefined) d.classList.toggle("step", step);
      }

      function sortedTouchList() {
        return Array.from(touches.values()).sort((a, b) => a.x - b.x);
      }

      function applyTouchAssignment() {
        const arr = sortedTouchList();
        const left = arr[0];
        const right = arr[1];

        if (!left || !right) {
          walkers.left.active = walkers.right.active = false;
          walkers.left.id = walkers.right.id = null;
          setDot(0, 0, 0, false, false);
          setDot(1, 0, 0, false, false);
          return;
        }

        const now = performance.now();
        if (walkers.left.id !== left.id) {
          walkers.left.prevY = left.y;
          walkers.left.ready = true;
          walkers.left.lastStepTime = now - STEP_TIMEOUT_MS;
        }
        if (walkers.right.id !== right.id) {
          walkers.right.prevY = right.y;
          walkers.right.ready = true;
          walkers.right.lastStepTime = now - STEP_TIMEOUT_MS;
        }

        walkers.left.active = walkers.right.active = true;
        walkers.left.id = left.id;
        walkers.right.id = right.id;
        setDot(0, left.x, left.y, true);
        setDot(1, right.x, right.y, true);
      }

      function haptic(ms) {
        if (navigator.vibrate) {
          try {
            navigator.vibrate(ms);
          } catch (e) {}
        }
      }

      function registerStep(foot, now, dotIndex) {
        if (lastFoot === foot && now - lastStepMs < 150) return;
        lastFoot = foot;
        lastStepMs = now;
        stepCount++;
        targetSpeed = Math.min(SPEED_MAX, targetSpeed + STEP_BOOST);
        haptic(8);

        // brief visual ping on the stepping dot
        if (dotIndex !== undefined) {
          DOTS[dotIndex].classList.add("step");
          setTimeout(() => DOTS[dotIndex].classList.remove("step"), 130);
        }
        hideHint();
        scheduleSave();
      }

      function updateWalker(w, footName, now, dotIndex) {
        if (!w.active) return;
        const t = touches.get(w.id);
        if (!t) return;
        const dy = t.y - w.prevY;
        if (dy < -2) w.ready = true; // lifted up → armed
        if (w.ready && dy > STEP_MIN_TRAVEL && now - w.lastStepTime > 150) {
          w.lastStepTime = now;
          w.ready = false;
          registerStep(footName, now, dotIndex);
        }
        w.prevY = t.y;
      }

      function handleTouchEvent(ev) {
        ev.preventDefault();
        for (const touch of ev.touches) {
          touches.set(touch.identifier, {
            id: touch.identifier,
            x: touch.clientX,
            y: touch.clientY,
          });
        }
        const active = new Set(Array.from(ev.touches).map((t) => t.identifier));
        for (const id of touches.keys()) if (!active.has(id)) touches.delete(id);
        applyTouchAssignment();
      }

      touchLayer.addEventListener("touchstart", handleTouchEvent, { passive: false });
      touchLayer.addEventListener("touchmove", handleTouchEvent, { passive: false });
      touchLayer.addEventListener("touchend", handleTouchEvent, { passive: false });
      touchLayer.addEventListener("touchcancel", handleTouchEvent, { passive: false });

      // ---------------------------------------------------------------
      // Hold the chip to reset the session
      // ---------------------------------------------------------------
      let resetTimer = 0;
      function armReset() {
        resetRing.classList.add("arming");
        resetTimer = setTimeout(() => {
          distanceFeet = 0;
          stepCount = 0;
          scheduleSave();
          haptic([10, 40, 10]);
          resetRing.classList.remove("arming");
        }, 650);
      }
      function cancelReset() {
        clearTimeout(resetTimer);
        resetRing.classList.remove("arming");
      }
      hudEl.addEventListener("pointerdown", armReset);
      hudEl.addEventListener("pointerup", cancelReset);
      hudEl.addEventListener("pointerleave", cancelReset);
      hudEl.addEventListener("pointercancel", cancelReset);

      // ---------------------------------------------------------------
      // Hint
      // ---------------------------------------------------------------
      let hintHidden = false;
      function hideHint() {
        if (hintHidden) return;
        hintHidden = true;
        hintEl.classList.add("hidden");
      }

      // ---------------------------------------------------------------
      // Distance formatting
      // ---------------------------------------------------------------
      function formatNumber(n) {
        return Math.floor(Math.max(0, n)).toLocaleString("en-US");
      }
      let lastShownStep = -1;
      function renderMetrics() {
        const feet = Math.max(0, distanceFeet);
        const miles = feet / FEET_PER_MILE;
        distValueEl.textContent = formatNumber(feet);
        distMiEl.textContent = miles.toFixed(2);
        stepsEl.textContent = formatNumber(stepCount);

        if (stepCount !== lastShownStep) {
          lastShownStep = stepCount;
          stepsEl.classList.add("pulse");
          clearTimeout(stepsEl._t);
          stepsEl._t = setTimeout(() => stepsEl.classList.remove("pulse"), 240);
        }
      }
      renderMetrics();

      // ---------------------------------------------------------------
      // Render / update loop
      // ---------------------------------------------------------------
      let lastTime = performance.now();
      let beltOffset = 0;

      function animate(now) {
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;

        updateWalker(walkers.left, "left", now, 0);
        updateWalker(walkers.right, "right", now, 1);

        // stop driving the belt if stepping pauses
        if (now - lastStepMs > STEP_TIMEOUT_MS) targetSpeed = 0;

        // smooth ramp toward target (continuous glide, no snapping)
        if (targetSpeed > beltSpeed) {
          beltSpeed = Math.min(targetSpeed, beltSpeed + dt * 4.2);
        } else {
          beltSpeed = Math.max(targetSpeed, beltSpeed - dt * 1.6);
        }
        // bleed the target down so a stale boost doesn't run forever
        if (targetSpeed > 0) targetSpeed = Math.max(0, targetSpeed - dt * 0.55);

        // ----- belt scroll: continuous, seamless, moving toward the viewer -----
        beltOffset += beltSpeed * dt * 0.46;
        beltTexture.offset.y = beltOffset % 1; // safe: texture tiles seamlessly
        topRoller.rotation.x = beltOffset * 6.0;
        bottomRoller.rotation.x = beltOffset * 6.0;

        const mph = beltSpeed * UNITS_TO_MPH;
        const displayActive = beltSpeed > 0.06;
        drawDisplayScreen(mph, displayActive);
        displayTexture.needsUpdate = true;
        screenMat.emissiveIntensity = displayActive
          ? 0.75 + Math.min(beltSpeed, 6) * 0.07
          : 0.38;
        statusLed.material.emissiveIntensity = displayActive ? 0.85 : 0.15;
        statusLed.material.color.setHex(displayActive ? 0x5dffb0 : 0x2a5c40);
        liveEl.classList.toggle("on", displayActive);

        // ----- distance integration from glide -----
        if (beltSpeed > 0.02) {
          const feetPerSec = (mph * FEET_PER_MILE) / 3600;
          distanceFeet += feetPerSec * dt;
          scheduleSave();
        }

        renderMetrics();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      renderer.render(scene, camera); // guaranteed first paint, independent of rAF
      requestAnimationFrame(animate);

      function onResize() {
        renderer.setSize(window.innerWidth, window.innerHeight);
        fitCameraToPad();
      }
      window.addEventListener("resize", onResize);
    </script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
